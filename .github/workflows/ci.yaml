# simple ci pipeline for an empty node application
#

name: Simple CI pipeline

on: 
  push:
    branches: [main, master]

  jobs: 
    build: 
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'
        - name: Install dependencies
          run: npm install
        - name: Run tests
          run: npm run test
